name: Run Framar Scraper

on:
  schedule:
    - cron: '0 */6 * * *' # Пуска се на всеки 6 часа
  workflow_dispatch:      # Бутонче за ръчно пускане от льольовци

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Commit and push changes
        # ТОВА Е МАГИЯТА, ГАЩНИК! Дори скриптът да крашне, пак ще сейфа труповете!
        if: always() 
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # Добавяме файлчовците само ако съществуват
          git add processed_urls.txt framar_doctors_full.csv || true
          
          # Къмитваме, ако има промени. Иначе малини, къпини, все тая.
          git commit -m "Автоматичен ъпдейт на докторчовци [skip ci]" || echo "Няма нови жертви за днес"
          
          # ЕТО ГО СПАСЕНИЕТО ТИ, АДЖАМИЯ! Дърпаме новите комитчовци, преди да пушнем.
          git pull --rebase origin main
          
          git push

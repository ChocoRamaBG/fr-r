name: Run Framar Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Commit and push changes
        if: always() 
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # Добавяне на файловете
          git add processed_urls.txt framar_doctors_full.csv || true
          
          # Създаване на commit
          git commit -m "Автоматичен ъпдейт на данни [skip ci]" || echo "Няма нови промени за запазване"
          
          # Изтегляне на последните промени със стратегия 'union' за избягване на конфликти
          git pull origin main --no-rebase --strategy-option=union
          
          # Изтласкване на промените
          git push

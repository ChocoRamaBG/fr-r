name: Run Framar Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Commit and push changes
        if: always() 
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # Instruct Git to use the 'union' merge driver for these specific files
          echo "framar_doctors_full.csv merge=union" > .gitattributes
          echo "processed_urls.txt merge=union" >> .gitattributes
          
          # Add the tracking files and the new .gitattributes file
          git add processed_urls.txt framar_doctors_full.csv .gitattributes || true
          
          # Create the commit
          git commit -m "Автоматичен ъпдейт на данни [skip ci]" || echo "Няма нови промени за запазване"
          
          # Pull the latest changes (the .gitattributes file will automatically resolve append conflicts)
          git pull origin main --no-rebase
          
          # Push the merged data to the repository
          git push
